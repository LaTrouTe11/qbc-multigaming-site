### Upkeep costs
#
#  All values are in irons unless specified
#
## Costs per deeded tile
#  tile_cost
#  tile_upkeep
#  free_tiles (in tiles)
#  free_tiles_upkeep (true/false)
#
## Costs per perimeter tile
#  perimeter_cost
#  perimeter_upkeep
#  free_perimeter (in tiles)
#  free_perimeter_upkeep (true/false)
#
## Minimum amount for upkeep
#  minimum_upkeep
#
## Extra money added to the founding charge that goes into upkeep
#  into_upkeep
#
## Cost for changing deed name during Resize
#  name_change
#
## Days of zero upkeep from village creation date.
#  upkeep_grace_period (days)
#
## Values vary depending on server type:
## Normal
## Epic/Challenge
#  normal_guard_cost
#  normal_guard_upkeep
#  epic_guard_cost
#  epic_guard_upkeep
#  free_guards_upkeep (true/false)
#
## Draining
#  min_drain
#  max_drain_modifier
#  drain_modifier_increment
#
