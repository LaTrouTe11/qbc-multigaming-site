name: Synchro Carte Wurm Legion Hosting

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connexion au dépôt GitHub
      uses: actions/checkout@v4

    - name: Télécharger la carte du Serveur 1 depuis Legion Hosting
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.LEGION_HOST }}
        username: ${{ secrets.LEGION_USER }}
        password: ${{ secrets.LEGION_PASS }}
        port: ${{ secrets.LEGION_PORT }}
        local-dir: ./map-folder-1/
        server-dir: /wurm/mapvieweroutput/

    - name: Mettre en ligne dans le dossier Serveur 1
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: ./map-folder-1/
        target-folder: serveur1
        branch: gh-pages
