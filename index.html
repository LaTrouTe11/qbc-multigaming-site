<script>
    let currentActiveFilter = "all";
    let currentQbcLang = "fr";

    function runQbcVisitorCounter() {
        let count = localStorage.getItem('qbc_visit_total') || 142;
        localStorage.setItem('qbc_visit_total', parseInt(count) + 1);
        if(document.getElementById('qbc-visitor-count-node')) document.getElementById('qbc-visitor-count-node').innerText = count;
    }

    let chronoTimeRemaining = 60;
    function runQbcChRadar() {
        chronoTimeRemaining--;
        if (document.getElementById('qbc-chrono-clock')) document.getElementById('qbc-chrono-clock').innerText = chronoTimeRemaining + "S";
        if (chronoTimeRemaining <= 0) { chronoTimeRemaining = 60; loadQbcMatrixDynamicConfig(); }
    }

    function loadQbcMatrixDynamicConfig() {
        // 🧱 SÉCURITÉ ABSOLUE ANTI-PAGE BLANCHE : CHARGE LE COCHON DE SECOURS SI CONFIG.JS MET DU TEMPS
        let db = window.qbcClusterData || {
            global: { type: "portal", indexMainTitle: "QBC Multigaming", indexSubTitle: "Portail d'Accès aux Instances Réseau", warn: "", title: "Bienvenue sur le Réseau QBC", desc: "Portail d'accès Legion Hosting.", portalTheme: "standard", securityNoCopy: "false" },
            wurm1: { type: "wurm", game_icon: "👑 ", name: "Doriath (Monde Principal)", ip: "67.216.85.235:27016", rb: "Tous les lundis à 04:00 AM", badge_state: "stable", wn_text: "Live Map active !", status: "online", slots: "12/40", votes: "45" },
        let db = window.qbcClusterData || (typeof qbcClusterData !== 'undefined' ? qbcClusterData : null);
        if (localStorage.getItem('qbc_server_db')) {
            try { db = JSON.parse(localStorage.getItem('qbc_server_db')); } catch(e) {}
        }
        if (!db) return;

        if (db.global) {
            // 🔐 PROTECTION VERROU ANTI-COPIE DYNAMIQUE (TRUE/FALSE ADMIN)
            if (db.global.securityNoCopy === "true") {
                document.body.style.setProperty('-webkit-user-select', 'none', 'important');
                document.body.style.setProperty('user-select', 'none', 'important');
                document.oncontextmenu = function(e) { e.preventDefault(); return false; };
            } else {
                document.body.style.setProperty('-webkit-user-select', 'text', 'important');
                document.body.style.setProperty('user-select', 'text', 'important');
                document.oncontextmenu = null;
            }

            // 📣 CONSOLE MOTD : TITRE + CORPS DE TEXTE BIENVENUE
            const motdPanel = document.getElementById('qbc-motd-panel');
            const motdTitle = document.getElementById('qbc-motd-title');
            const motdDesc = document.getElementById('qbc-motd-desc');
            if (motdPanel && motdTitle && motdDesc && db.global.title && db.global.title.trim() !== "") {
                motdTitle.innerText = "📢 " + db.global.title;
                motdDesc.innerText = db.global.desc || ""; 
                motdPanel.style.setProperty('display', 'block', 'important');
            }

            if (db.global.indexMainTitle && document.getElementById('qbc-index-main-title')) {
                document.getElementById('qbc-index-main-title').innerText = db.global.indexMainTitle;
                document.getElementById('qbc-index-main-title').setAttribute('data-fr', db.global.indexMainTitle);
            }
            if (db.global.indexSubTitle && document.getElementById('qbc-index-sub-title')) {
                document.getElementById('qbc-index-sub-title').innerText = db.global.indexSubTitle;
                document.getElementById('qbc-index-sub-title').setAttribute('data-fr', db.global.indexSubTitle);
            }
            
            const warningSignal = document.getElementById('cfg-global-warn');
            const warningBar = document.getElementById('qbc-alert-banner');
            if (warningSignal && db.global.warn) {
                warningSignal.innerText = db.global.warn;
                if(warningBar) warningBar.style.setProperty('display', 'block', 'important');
            } else if (warningBar) {
                warningBar.style.setProperty('display', 'none', 'important');
            }
            
            const themeMap = {
                'standard': "radial-gradient(circle at center, rgba(30, 20, 15, 0.2) 0%, rgba(5, 3, 2, 0.7) 100%), url('portal_bg.jpg')",
                'noel': "radial-gradient(circle at center, rgba(15, 35, 15, 0.3) 0%, rgba(3, 8, 3, 0.85) 100%), url('noel_bg.jpg')",
                'halloween': "radial-gradient(circle at center, rgba(45, 20, 5, 0.3) 0%, rgba(10, 5, 2, 0.9) 100%), url('halloween_bg.jpg')",
                'paques': "radial-gradient(circle at center, rgba(20, 45, 20, 0.2) 0%, rgba(5, 10, 5, 0.8) 100%), url('paques_bg.jpg')",
                'cyberpunk': "radial-gradient(circle at center, rgba(25, 5, 35, 0.25) 0%, rgba(5, 2, 8, 0.9) 100%), url('cyber_bg.jpg')",
                'apocalypse': "radial-gradient(circle at center, rgba(40, 10, 10, 0.3) 0%, rgba(12, 3, 3, 0.95) 100%), url('apoc_bg.jpg')",
                'space': "radial-gradient(circle at center, rgba(10, 20, 40, 0.15) 0%, rgba(2, 4, 10, 0.9) 100%), url('space_bg.jpg')"
            };
            if (db.global.portalTheme && themeMap[db.global.portalTheme]) {
                document.body.style.setProperty('background-image', themeMap[db.global.portalTheme], 'important');
            }
        }

        const pillbox = document.getElementById('qbc-tabs-pillbox');
        if (pillbox) {
            let uniqueTypes = new Set();
            Object.keys(db).forEach(k => { if(k !== "global" && db[k].type) uniqueTypes.add(db[k].type.toLowerCase().trim()); });
            let pillsHTML = `<button class="filter-pill ${currentActiveFilter === 'all' ? 'active' : ''}" id="pill-all" onclick="applyQbcClusterFilter('all')">TOUTES LES INSTANCES</button>`;
            uniqueTypes.forEach(t => {
                pillsHTML += `<button class="filter-pill ${currentActiveFilter === t ? 'active' : ''}" id="pill-${t}" onclick="applyQbcClusterFilter('${t}')">${t.toUpperCase()}</button>`;
            });
            pillbox.innerHTML = pillsHTML;
        }

        const masterGrid = document.getElementById('qbc-main-grid-node');
        if(!masterGrid) return; masterGrid.innerHTML = "";

        Object.keys(db).forEach(key => {
            if (key === "global") return;
            const srv = db[key];
            let srvTypeLower = (srv.type || "").toLowerCase().trim();
            if (currentActiveFilter !== "all" && srvTypeLower !== currentActiveFilter) return;

            let srvSlots = srv.slots || "0/40";
            let srvVotes = srv.votes || 0;
            let detailPageLink = srvTypeLower + ".html";

            let badgeStateHTML = "";
            let neonColor = "rgba(0, 25, 204, 0.3)";
            let neonGlowStyle = "0 0 25px rgba(0, 25, 204, 0.25), inset 0 1px 2px rgba(255,255,255,0.1)";
            
            if (srvTypeLower === "7dtd") {
                neonColor = "rgba(239, 68, 68, 0.4)";
                neonGlowStyle = "0 0 30px rgba(239, 68, 68, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            } else if (srvTypeLower === "avorion") {
                neonColor = "rgba(0, 153, 255, 0.4)";
                neonGlowStyle = "0 0 30px rgba(0, 153, 255, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            } else if (srvTypeLower === "wurm") {
                neonColor = "rgba(255, 153, 0, 0.4)";
                neonGlowStyle = "0 0 30px rgba(255, 153, 0, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            }

            let badgeState = (srv.badge_state || "stable").toLowerCase().trim();
            if (badgeState === "urgent") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;">🚨 CRITICAL WARNING</span>`;
            } else if (badgeState === "maintenance") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(255, 153, 0, 0.1); color: #ff9900; border: 1px dashed #ff9900;">🛠️ MAINTENANCE</span>`;
            } else if (badgeState === "pack") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid #a855f7;">📦 PACK AJOURNÉ</span>`;
            } else if (badgeState === "sync") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(0, 153, 255, 0.1); color: #0099ff; border: 1px dashed #0099ff;">📡 SYNC EN COURS</span>`;
            } else {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(0, 25, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc;">🟢 NODE STABLE</span>`;
            }

            let independentMessageHTML = "";
            if (srv.wn_text && srv.wn_text.trim() !== "") {
                independentMessageHTML = `<div style="margin-top: 10px; font-family: monospace; font-size: 11px; color: #00ffcc; line-height: 1.4; padding-left: 10px; border-left: 2px solid #00ffcc;">📌 INFO MESSAGE: ${srv.wn_text}</div>`;
            }

            let actionBtnSecondaryHTML = `<a href="${detailPageLink}" class="btn-portal" style="background: linear-gradient(135deg, #ffcc00, #ff9900) !important; color: #050302 !important; border: 1px solid #ffcc00 !important; box-shadow: 0 4px 15px rgba(255,153,0,0.3) !important;">🗺️ VOIR LA LIVE MAP [LIVE]</a>`;
            if (srvTypeLower === "7dtd") {
                actionBtnSecondaryHTML = `<a href="7dtd.html" class="btn-portal" style="background: rgba(239, 68, 68, 0.08) !important; color: #ef4444 !important; border: 1px dashed #ef4444 !important; font-weight: 900 !important;">🧟 VOIR LES 136 MODS [PACK]</a>`;
            } else if (srvTypeLower === "avorion") {
                actionBtnSecondaryHTML = `<a href="avorion.html" class="btn-portal" style="background: rgba(0, 153, 255, 0.08) !important; color: #0099ff !important; border: 1px dashed #0099ff !important; font-weight: 900 !important;">🚀 SPECIFICATIONS VAISSEAUX</a>`;
            }

            let currentPlayers = "0";
            let maxPlayers = "40";
            if (srvSlots.includes('/')) {
                let parts = srvSlots.split('/');
                currentPlayers = parts[0].trim();
                maxPlayers = parts[1].trim();
            }

            masterGrid.innerHTML += `
                <div class="server-card-portal" style="border: 1px solid ${neonColor} !important; box-shadow: ${neonGlowStyle} !important;">
                    <div class="card-split-layout">
                        <div>
                            <h3 style="margin: 0 0 6px 0; font-size: 21px; color: #fff; font-family: monospace; font-weight: bold;">${srv.game_icon || ''}${srv.name}</h3>
                            <div class="qbc-net-address-badge">${srv.ip}</div>
                            
                            <div style="margin-top: 12px; font-family: monospace; font-size: 12px; color: #ffffff !important; line-height: 1.4; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 4px; border: 1px dashed rgba(255,255,255,0.06);">
                                <span style="color:#ff9900; font-weight:bold;">⏳ REBOOT:</span> ${srv.rb}
                            </div>
                            ${badgeStateHTML}
                            ${independentMessageHTML}
                        </div>
