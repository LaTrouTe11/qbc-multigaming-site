<!-- VERSION V50.5 SYNTAX REPAIRED - PORTAIL SERVEUR QBC - ALL EFFECTS FIXED -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Serveur QBC</title>
    
    <script>
        (function() {
            const DEPLOY_VERSION_QBC = "50.5";
            if (localStorage.getItem('qbc_matrix_version') !== DEPLOY_VERSION_QBC) {
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('qbc_matrix_version', DEPLOY_VERSION_QBC);
                console.log("🛡️ Système QBC : Syntaxe réparée et synchronisée.");
            }
        })();
    </script>

    <style>
        body { -webkit-user-select: none; user-select: none; background-color: #030202; color: #f4eae1; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background-image: radial-gradient(circle at center, rgba(15, 10, 35, 0.15) 0%, rgba(2, 1, 3, 0.85) 100%), url('portal_bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .portal-container { width: 1450px; max-width: 100%; margin: 0 auto; padding: 30px; box-sizing: border-box; text-align: center; }
        
        .main-header { margin: 40px 0 30px 0; }
        .main-header h1 { font-size: 38px; color: #fff; font-family: monospace; font-weight: 900; margin: 0; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,153,0,0.2); }
        .main-header p { margin: 8px 0 0 0; font-size: 12px; color: #ff9900; font-family: monospace; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }
        
        .qbc-global-warning-bar { width: 100% !important; background: linear-gradient(90deg, #4c0519, #dc2626, #4c0519) !important; border-bottom: 2px solid #ef4444 !important; padding: 12px 0 !important; text-align: center !important; font-family: monospace !important; font-size: 13px !important; font-weight: bold !important; color: #fff !important; text-transform: uppercase; display: none; }

        .qbc-cluster-global-counter-panel { background: rgba(10, 7, 6, 0.6); border: 1px solid rgba(255, 153, 0, 0.15); border-radius: 8px; max-width: 750px; margin: 0 auto 35px auto; padding: 10px; display: flex; justify-content: center; gap: 12px; backdrop-filter: blur(10px); }
        .filter-pill { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 153, 0, 0.25); color: #a1a1aa; font-family: monospace; font-size: 11px; font-weight: bold; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .filter-pill.active { background: #ff9900; color: #050302; border-color: #ff9900; box-shadow: 0 0 15px rgba(255,153,0,0.3); font-weight: 900; }

        .qbc-master-servers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 100%; box-sizing: border-box; }
        
        .server-card-portal { 
            background: rgba(12, 8, 7, 0.65) !important; 
            border-radius: 12px !important; 
            padding: 25px !important; 
            box-sizing: border-box !important; 
            backdrop-filter: blur(20px) !important; 
            -webkit-backdrop-filter: blur(20px) !important; 
            transition: all 0.2s ease-in-out !important; 
            min-height: 290px !important; 
            height: 290px !important; 
            display: flex !important; 
            flex-direction: column !important; 
            justify-content: center !important;
            position: relative !important;
        }
        
        .card-split-layout { display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 25px; text-align: left; }
        
        .qbc-net-address-badge { background: rgba(0, 0, 0, 0.6); padding: 8px 14px; border-radius: 5px; font-family: monospace; font-size: 14px; color: #00ffcc; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; box-shadow: inset 0 1px 5px rgba(0,0,0,0.5); letter-spacing: 0.5px; }
        .status-badge-led { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: monospace; font-weight: bold; }
        .led-pulse { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .led-green { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        
        .btn-portal { background: #140e0a; color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 12px; font-weight: 900; text-transform: uppercase; border-radius: 5px; font-size: 11px; cursor: pointer; text-decoration: none; text-align: center; font-family: monospace; width: 100%; box-sizing: border-box; display: block; letter-spacing: 1px; transition: all 0.2s ease; }
        .btn-portal:hover { background: #fff; color: #050302; box-shadow: 0 4px 15px rgba(255,255,255,0.15); }
        
        .status-pill-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-family: monospace; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        
        .qbc-portal-footer-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 60px; padding-top: 20px; border-top: 1px dashed rgba(255,255,255,0.08); font-size: 11px; font-family: monospace; }
        .btn-admin-access { background: transparent; border: 1px dashed rgba(255,153,0,0.25); color: rgba(255,153,0,0.4); padding: 8px 16px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .btn-admin-access:hover { border-color: #ff9900; color: #ff9900; }
        .qbc-live-slots-node { font-size: 12px; font-weight: 900; font-family: monospace; }
    </style>
</head>
<body>

<div class="qbc-global-warning-bar" id="qbc-alert-banner">
    <span id="cfg-global-warn">INITIALISATION DU PORTAIL SERVEUR...</span>
</div>

<div class="portal-container">
    <div class="main-header">
        <h1 id="qbc-index-main-title">PORTAIL SERVEUR QBC</h1>
        <p id="qbc-index-sub-title">INFRASTRUCTURE UNIFIÉE D'ACCÈS RÉSEAU</p>
    </div>

    <div class="qbc-cluster-global-counter-panel" id="qbc-tabs-pillbox">
        <button class="filter-pill active" id="pill-all" onclick="applyQbcClusterFilter('all')">TOUTES LES INSTANCES</button>
    </div>

    <div class="qbc-master-servers-grid" id="qbc-main-grid-node"></div>

    <div class="qbc-portal-footer-bar">
        <div style="color:#00ffcc;">👥 MATRIX USERS: <span id="qbc-visitor-count-node">1</span></div>
        <a href="admin.html" class="btn-admin-access">🎛️ ACCÈS COCKPIT ADMIN</a>
        <div style="color:#ff9900; font-weight:bold; text-transform:uppercase; letter-spacing:1px;">MATRIX SECURE CONDUIT</div>
        <div style="color:#ff9900;">📡 RADAR CORE: <span id="qbc-chrono-clock">60S</span></div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    let currentActiveFilter = "all";

    function runQbcVisitorCounter() {
        let count = localStorage.getItem('qbc_visit_total') || 142;
        localStorage.setItem('qbc_visit_total', parseInt(count) + 1);
        if(document.getElementById('qbc-visitor-count-node')) document.getElementById('qbc-visitor-count-node').innerText = count;
    }

    let chronoTimeRemaining = 60;
    function runQbcChRadar() {
        chronoTimeRemaining--;
        if (document.getElementById('qbc-chrono-clock')) document.getElementById('qbc-chrono-clock').innerText = chronoTimeRemaining + "S";
        if (chronoTimeRemaining <= 0) { chronoTimeRemaining = 60; loadQbcMatrixDynamicConfig(); }
    }

    function loadQbcMatrixDynamicConfig() {
        let db = window.qbcClusterData || (typeof qbcClusterData !== 'undefined' ? qbcClusterData : null);
        if (localStorage.getItem('qbc_server_db')) {
            try { db = JSON.parse(localStorage.getItem('qbc_server_db')); } catch(e) {}
        }
        if (!db) return;

        if (db.global) {
            if (db.global.indexMainTitle && document.getElementById('qbc-index-main-title')) document.getElementById('qbc-index-main-title').innerText = db.global.indexMainTitle;
            if (db.global.indexSubTitle && document.getElementById('qbc-index-sub-title')) document.getElementById('qbc-index-sub-title').innerText = db.global.indexSubTitle;
            const warningSignal = document.getElementById('cfg-global-warn');
            const warningBar = document.getElementById('qbc-alert-banner');
            if (warningSignal && db.global.warn) {
                warningSignal.innerText = db.global.warn;
                if(warningBar) warningBar.style.setProperty('display', 'block', 'important');
            } else if (warningBar) {
                warningBar.style.setProperty('display', 'none', 'important');
            }
            
            const themeMap = {
                'standard': "radial-gradient(circle at center, rgba(30, 20, 15, 0.2) 0%, rgba(5, 3, 2, 0.7) 100%), url('portal_bg.jpg')",
                'noel': "radial-gradient(circle at center, rgba(15, 35, 15, 0.3) 0%, rgba(3, 8, 3, 0.85) 100%), url('noel_bg.jpg')",
                'halloween': "radial-gradient(circle at center, rgba(45, 20, 5, 0.3) 0%, rgba(10, 5, 2, 0.9) 100%), url('halloween_bg.jpg')",
                'paques': "radial-gradient(circle at center, rgba(20, 45, 20, 0.2) 0%, rgba(5, 10, 5, 0.8) 100%), url('paques_bg.jpg')",
                'cyberpunk': "radial-gradient(circle at center, rgba(25, 5, 35, 0.25) 0%, rgba(5, 2, 8, 0.9) 100%), url('cyber_bg.jpg')",
                'apocalypse': "radial-gradient(circle at center, rgba(40, 10, 10, 0.3) 0%, rgba(12, 3, 3, 0.95) 100%), url('apoc_bg.jpg')",
                'space': "radial-gradient(circle at center, rgba(10, 20, 40, 0.15) 0%, rgba(2, 4, 10, 0.9) 100%), url('space_bg.jpg')"
            };
            if (db.global.portalTheme && themeMap[db.global.portalTheme]) {
                document.body.style.setProperty('background-image', themeMap[db.global.portalTheme], 'important');
            }
        }

        const pillbox = document.getElementById('qbc-tabs-pillbox');
        if (pillbox) {
            let uniqueTypes = new Set();
            Object.keys(db).forEach(k => { if(k !== "global" && db[k].type) uniqueTypes.add(db[k].type.toLowerCase().trim()); });
            let pillsHTML = `<button class="filter-pill ${currentActiveFilter === 'all' ? 'active' : ''}" id="pill-all" onclick="applyQbcClusterFilter('all')">TOUTES LES INSTANCES</button>`;
            uniqueTypes.forEach(t => {
                pillsHTML += `<button class="filter-pill ${currentActiveFilter === t ? 'active' : ''}" id="pill-${t}" onclick="applyQbcClusterFilter('${t}')">${t.toUpperCase()}</button>`;
            });
            pillbox.innerHTML = pillsHTML;
        }

        const masterGrid = document.getElementById('qbc-main-grid-node');
        if(!masterGrid) return; masterGrid.innerHTML = "";

        Object.keys(db).forEach(key => {
            if (key === "global") return;
            const srv = db[key];
            let srvTypeLower = (srv.type || "").toLowerCase().trim();
            if (currentActiveFilter !== "all" && srvTypeLower !== currentActiveFilter) return;

            let srvSlots = srv.slots || "0/40";
            let srvVotes = srv.votes || 0;
            let detailPageLink = srvTypeLower + ".html";

            let badgeStateHTML = "";
            
            let neonColor = "rgba(0, 25, 204, 0.3)";
            let neonGlowStyle = "0 0 25px rgba(0, 25, 204, 0.25), inset 0 1px 2px rgba(255,255,255,0.1)";
            
            if (srvTypeLower === "7dtd") {
                neonColor = "rgba(239, 68, 68, 0.4)";
                neonGlowStyle = "0 0 30px rgba(239, 68, 68, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            } else if (srvTypeLower === "avorion") {
                neonColor = "rgba(0, 153, 255, 0.4)";
                neonGlowStyle = "0 0 30px rgba(0, 153, 255, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            } else if (srvTypeLower === "wurm") {
                neonColor = "rgba(255, 153, 0, 0.4)";
                neonGlowStyle = "0 0 30px rgba(255, 153, 0, 0.3), 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.1)";
            }

            let badgeState = (srv.badge_state || "stable").toLowerCase().trim();
            if (badgeState === "urgent") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;">🚨 CRITICAL WARNING</span>`;
            } else if (badgeState === "maintenance") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(255, 153, 0, 0.1); color: #ff9900; border: 1px dashed #ff9900;">🛠️ MAINTENANCE</span>`;
            } else if (badgeState === "pack") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid #a855f7;">📦 PACK AJOURNÉ</span>`;
            } else if (badgeState === "sync") {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(0, 153, 255, 0.1); color: #0099ff; border: 1px dashed #0099ff;">📡 SYNC EN COURS</span>`;
            } else {
                badgeStateHTML = `<span class="status-pill-badge" style="background: rgba(0, 25, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc;">🟢 NODE STABLE</span>`;
            }

            let independentMessageHTML = "";
            if (srv.wn_text && srv.wn_text.trim() !== "") {
                independentMessageHTML = `<div style="margin-top: 10px; font-family: monospace; font-size: 11px; color: #00ffcc; line-height: 1.4; padding-left: 10px; border-left: 2px solid #00ffcc;">📌 INFO MESSAGE: ${srv.wn_text}</div>`;
            }

            let actionBtnSecondaryHTML = `<a href="${detailPageLink}" class="btn-portal" style="background: linear-gradient(135deg, #ffcc00, #ff9900) !important; color: #050302 !important; border: 1px solid #ffcc00 !important; box-shadow: 0 4px 15px rgba(255,153,0,0.3) !important;">🗺️ VOIR LA LIVE MAP [LIVE]</a>`;
            if (srvTypeLower === "7dtd") {
                actionBtnSecondaryHTML = `<a href="7dtd.html" class="btn-portal" style="background: rgba(239, 68, 68, 0.08) !important; color: #ef4444 !important; border: 1px dashed #ef4444 !important; font-weight: 900 !important;">🧟 VOIR LES 136 MODS [PACK]</a>`;
            } else if (srvTypeLower === "avorion") {
                actionBtnSecondaryHTML = `<a href="avorion.html" class="btn-portal" style="background: rgba(0, 153, 255, 0.08) !important; color: #0099ff !important; border: 1px dashed #0099ff !important; font-weight: 900 !important;">🚀 SPECIFICATIONS VAISSEAUX</a>`;
            }

            let currentPlayers = "0";
            let maxPlayers = "40";
            if (srvSlots.includes('/')) {
                let parts = srvSlots.split('/');
                currentPlayers = parts[0].trim();
                maxPlayers = parts[1].trim();
            }

            masterGrid.innerHTML += `
                <div class="server-card-portal" style="border: 1px solid ${neonColor} !important; box-shadow: ${neonGlowStyle} !important;">
                    <div class="card-split-layout">
                        <div>
                            <h3 style="margin: 0 0 6px 0; font-size: 21px; color: #fff; font-family: monospace; font-weight: bold;">${srv.name}</h3>
                            <div class="qbc-net-address-badge">${srv.ip}</div>
                            
                            <div style="margin-top: 12px; font-family: monospace; font-size: 12px; color: #ffffff !important; line-height: 1.4; background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 4px; border: 1px dashed rgba(255,255,255,0.06);">
                                <span style="color:#ff9900; font-weight:bold;">⏳ REBOOT:</span> ${srv.rb}
                            </div>
                            
                            ${badgeStateHTML}
                            ${independentMessageHTML}
                        </div>
                        
                        <div style="display: flex; flex-direction: column; justify-content: flex-start; border-left: 1px dashed rgba(255,255,255,0.08); padding-left: 20px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 4px; height: 36px !important; box-sizing: border-box !important;">
                                <div class="status-badge-led"><span class="qbc-live-ping-node">34 MS</span></div>
                                <div class="status-badge-led">👥 <span class="qbc-live-slots-node" data-current="${currentPlayers}" data-max="${maxPlayers}">${currentPlayers}/${maxPlayers}</span></div>
                                <div class="status-badge-led" style="color:#00ffcc;"><span class="led-pulse led-green"></span>LIVE</div>
                            </div>
                            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 15px;">
                                <div style="flex: 1; background: rgba(255, 153, 0, 0.02); border: 1px dashed rgba(255, 153, 0, 0.2); padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; font-weight: bold; color: #ff9900; text-align: center;">🔥 VOTES: <span id="vote-count-${key}">${srvVotes}</span></div>
                                <button onclick="castQbcMatrixVote('${key}')" style="background: #ff9900; color: #050302; border: none; padding: 10px 14px; font-family: monospace; font-size: 11px; font-weight: 900; border-radius: 4px; cursor: pointer;">👍</button>
                            </div>
                            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
                                <a href="steam://connect/${srv.ip}" class="btn-portal">⚔️ REJOINDRE LE SERVEUR</a>
                                ${actionBtnSecondaryHTML}
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    // 🚨 MULTIPLEXEUR DE VOTES V51.0 : ROUTAGE ET COOLDOWN SANS ACCLADE ORPHELINE
    function castQbcMatrixVote(srvKey) {
        let db = window.qbcClusterData || (typeof qbcClusterData !== 'undefined' ? qbcClusterData : null);
        if (localStorage.getItem('qbc_server_db')) { try { db = JSON.parse(localStorage.getItem('qbc_server_db')); } catch(e) {} }
        if (db && db[srvKey]) {
            const srv = db[srvKey];
            
            const btnNode = document.querySelector(`button[onclick="castQbcMatrixVote('${srvKey}')"]`);
            if (btnNode && btnNode.getAttribute('data-locked') === 'true') return;

            let currentVotes = parseInt(srv.votes) || 0; currentVotes++;
            db[srvKey].votes = currentVotes.toString();
            localStorage.setItem('qbc_server_db', JSON.stringify(db));
            
            const voteNode = document.getElementById(`vote-count-${srvKey}`); if (voteNode) voteNode.innerText = currentVotes;

            if (btnNode) {
                btnNode.setAttribute('data-locked', 'true');
                btnNode.style.setProperty('background', '#4b5563', 'important');
                let timeLeft = 5; btnNode.innerText = `⏳ ${timeLeft}s`;
                let cooldownTicker = setInterval(() => {
                    timeLeft--; btnNode.innerText = `⏳ ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        clearInterval(cooldownTicker); btnNode.removeAttribute('data-locked');
                        btnNode.style.setProperty('background', '#ff9900', 'important'); btnNode.innerText = "👍";
                    }
                }, 1000);
            }

            let srvTypeLower = (srv.type || "").toLowerCase().trim();
            let nameLower = (srv.name || "").toLowerCase();
            
            if (srvTypeLower === "wurm" || nameLower.includes("wurm") || nameLower.includes("doriath")) {
                window.open("https://wurm-unlimited.com", "_blank");
            } else if (srvTypeLower === "7dtd" || nameLower.includes("7dtd") || nameLower.includes("die") || nameLower.includes("survie")) {
                window.open("https://7daystodie-servers.com", "_blank");
            } else {
                window.open("https://top-serveurs.net", "_blank");
            }
        }
    }

    window.onload = function() {
        runQbcVisitorCounter(); loadQbcMatrixDynamicConfig();
        setInterval(runQbcChRadar, 1000);
        setInterval(() => {
            document.querySelectorAll('.qbc-live-ping-node').forEach(node => {
                let cardText = node.closest('.server-card-portal').innerHTML.toLowerCase();
                let pingBase = cardText.includes("wurm") || cardText.includes("doriath") ? 8 : 34;
                node.innerText = (pingBase + Math.floor(Math.random() * 5) - 2) + " MS";
            });
        }, 3000);
        setInterval(() => {
            document.querySelectorAll('.qbc-live-slots-node').forEach(node => {
                let text = node.innerText || "0/40";
                if (!text.includes('/')) return;
                let parts = text.split('/');
                let current = parseInt(parts[0]) || 0;
                let max = parseInt(parts[1]) || 40;
                let dice = Math.random();
                if (dice > 0.75 && current < max) current++; else if (dice < 0.25 && current > 0) current--;
                node.innerText = current + "/" + max;
            });
        }, 4000);
    };

    function applyQbcClusterFilter(game) {
        currentActiveFilter = game;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        const activePill = document.getElementById(`pill-${game}`); if(activePill) activePill.classList.add('active');
        loadQbcMatrixDynamicConfig();
    }
</script>
</body>
</html>
