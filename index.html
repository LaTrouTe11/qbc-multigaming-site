<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[QBC] Terminal Multigaming | Portail Officiel</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* FOND APOCALYPSE TERMINAL PROFESSIONNEL */
        body {
            background-color: #050303;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        .portal-container {
            max-width: 1350px;
            width: 100%;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #cc3333;
            font-family: monospace;
            font-size: 26px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(204, 51, 51, 0.6);
            text-transform: uppercase;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
            margin-top: 20px;
        }

        /* LES GRANDS CADRES PRO AVEC IMAGES DE COUVERTURE */
        .game-card {
            position: relative;
            height: 260px;
            border-radius: 8px;
            border: 1px solid #2b1c1c;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 12px 30px rgba(0,0,0,0.95);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s ease-in-out;
        }

        .card-7dtd { background-image: url('7dtd/background.jpg'); }
        .card-wurm { background-image: url('wurm/background.jpg'); }
        .card-avorion { background-image: url('avorion/background.jpg'); }

        .game-card:hover {
            border-color: #cc3333;
            box-shadow: 0 0 25px rgba(204, 51, 51, 0.5);
            transform: translateY(-4px);
            background-size: 105%;
        }

        /* FILTRE PRO DE CONTRASTE DU MILIEU */
        .game-card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(5,3,3,0.9) 20%, rgba(5,3,3,0.5) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        /* ÉCRITURE DES BOUTONS ROUTEURS DOUBLE SERVEURS WHITE HAUTE VISIBILITÉ */
        .server-route-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            background: #0f0b0b;
            color: #ffffff;
            border: 1px solid #442222;
            padding: 8px 12px;
            margin-top: 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .server-route-btn:hover {
            background: #cc3333;
            color: #000000;
            border-color: #cc3333;
            box-shadow: 0 0 12px rgba(204, 51, 51, 0.7);
            transform: scale(1.02);
        }

        /* STYLE DE L'ICÔNE ANIMÉE RADAR */
        .portal-game-icon {
            font-size: 38px;
            margin-bottom: 5px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px rgba(204, 51, 51, 0.5);
            display: inline-block;
        }

        .game-card:hover .portal-game-icon {
            transform: scale(1.12) rotateY(360deg);
            text-shadow: 0 0 20px #cc3333;
        }

        .portal-game-title {
            color: #ffffff !important;
            font-weight: bold;
            font-family: monospace, sans-serif;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 1.5px;
            margin: 0 0 5px 0;
            padding-bottom: 4px;
            border-bottom: 2px solid #cc3333;
            text-shadow: 2px 2px 4px #000000;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <h1>📊 TERMINAL MULTIGAMING INTERACTIF QBC</h1>

        <div class="games-grid">
            
            <!-- 🧟 SECTION 7 DAYS TO DIE (2 SERVEURS INSTANTANÉS) -->
            <div class="game-card card-7dtd">
                <div class="game-card-overlay">
                    <div class="portal-game-icon">🧟‍♂️</div>
                    <h3 class="portal-game-title">7 DAYS TO DIE</h3>
                    <a href="7dtd/index.html?server=7dtd1" class="server-route-btn">
                        <span>🛑 Flaggard ProjectZ</span>
                        <span id="portal-mini-7dtd1" style="color:#2ecc71;">(--)</span>
                    </a>
                    <a href="7dtd/index.html?server=7dtd2" class="server-route-btn">
                        <span>🛑 Flaggard New Mods</span>
                        <span id="portal-mini-7dtd2" style="color:#2ecc71;">(--)</span>
                    </a>
                </div>
            </div>

            <!-- 🏰 SECTION WURM UNLIMITED (2 ROYAUMES INSTANTANÉS) -->
            <div class="game-card card-wurm">
                <div class="game-card-overlay">
                    <div class="portal-game-icon">🏰</div>
                    <h3 class="portal-game-title">WURM UNLIMITED</h3>
                    <a href="wurm/index.html?server=wurm1" class="server-route-btn">
                        <span>⚔️ Royaume Élite 1</span>
                        <span id="portal-mini-wurm1" style="color:#2ecc71;">(--)</span>
                    </a>
                    <a href="wurm/index.html?server=wurm2" class="server-route-btn">
                        <span>⚔️ Royaume Élite 2</span>
                        <span id="portal-mini-wurm2" style="color:#2ecc71;">(--)</span>
                    </a>
                </div>
            </div>

            <!-- 🚀 SECTION AVORION (2 SECTEURS INSTANTANÉS) -->
            <div class="game-card card-avorion">
                <div class="game-card-overlay">
                    <div class="portal-game-icon">🚀</div>
                    <h3 class="portal-game-title">AVORION</h3>
                    <a href="avorion/index.html?server=avorion1" class="server-route-btn">
                        <span>🛰️ Secteur Core 1</span>
                        <span id="portal-mini-avorion1" style="color:#2ecc71;">(--)</span>
                    </a>
                    <a href="avorion/index.html?server=avorion2" class="server-route-btn">
                        <span>🛰️ Secteur Core 2</span>
                        <span id="portal-mini-avorion2" style="color:#2ecc71;">(--)</span>
                    </a>
                </div>
            </div>

        </div>
    </div>

<script src="js/config.js"></script>
<script>
    function syncPortalLiveCounters() {
        const servers = ['7dtd1', '7dtd2', 'wurm1', 'wurm2', 'avorion1', 'avorion2'];
        
        servers.forEach(srv => {
            fetch('/.netlify/functions/get-players?game=' + srv)
                .then(res => res.json())
                .then(data => {
                    const el = document.getElementById('portal-mini-' + srv);
                    const textEl = document.getElementById('portal-stats-' + srv);
                    
                    // Lit le nombre de slots max écrit dans votre config.js
                    const maxSlots = (typeof QBC_GLOBAL_CONFIG !== 'undefined' && QBC_GLOBAL_CONFIG[srv]) ? (QBC_GLOBAL_CONFIG[srv].maxPlayers || 40) : 40;
                    
                    if (el) {
                        el.innerText = data.online ? `(${data.count}/${maxSlots})` : `(0/${maxSlots})`;
                    }
                    if (textEl) {
                        const label = srv.startsWith('wurm') ? 'ROYAUME' : 'SECTEUR';
                        textEl.innerText = data.online ? `${label} : ${data.count} / ${maxSlots}` : `${label} : LOCAL DECONECT`;
                    }
                })
                .catch(() => {
                    const el = document.getElementById('portal-mini-' + srv);
                    if (el) el.innerText = "(0/40)";
                });
        });
    }
    syncPortalLiveCounters();
    setInterval(syncPortalLiveCounters, 60000);
</script>

</body>
</html>
