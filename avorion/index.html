<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[QBC] Avorion | Terminal Cyber-Spatial 2026</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* 🌌 FOND 2026 REHAUSSÉ CLAIR : Lueur Bleu Cyan Laser diffuse style cockpit SF adoucie */
        body { 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; 
            background-color: #020308; color: #ffffff; font-family: 'Courier New', monospace, system-ui, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0e244d 0%, #030611 100%);
        }
        .game-layout { max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        /* Fiche technique translucide effet verre cybernétique */
        .server-card { 
            background: rgba(8, 15, 28, 0.88); 
            border: 1px solid rgba(0, 255, 204, 0.25); 
            border-radius: 16px; padding: 30px; 
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.05); 
            backdrop-filter: blur(8px);
        }
        
        /* 💡 LED DE STATUT FLASHY COULEUR STANDARD INTERNATIONALE (VERT) */
        .led-green { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71; display: inline-block; margin-right: 6px; }
        
        /* 💡 BOUTON RETOUR : Fond sombre solide visible, plus transparent ! */
        .btn-portal-back {
            background: #091220 !important; 
            color: #ffffff !important; 
            border: 1px solid #00a2ff !important; 
            padding: 10px 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            border-radius: 8px; 
            font-size: 11px; 
            cursor: pointer; 
            transition: 0.3s; 
            text-decoration: none; 
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            display: inline-block;
        }
        .btn-portal-back:hover { 
            background: #00a2ff !important; 
            color: #000000 !important; 
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.6); 
            transform: translateY(-2px); 
        }

        .btn-7dtd { 
            background: rgba(6, 17, 34, 0.6); color: #00a2ff; border: 1px solid #00558f; 
            padding: 10px 20px; font-weight: bold; text-transform: uppercase; border-radius: 8px; 
            font-size: 12px; cursor: pointer; transition: 0.3s; text-decoration: none; 
            backdrop-filter: blur(4px); box-shadow: inset 0 0 10px rgba(0, 162, 255, 0.1);
        }
        .btn-7dtd:hover { background: #00a2ff; color: #000; border-color: #00a2ff; box-shadow: 0 0 15px rgba(0, 162, 255, 0.6); transform: translateY(-2px); }
        
        /* 💡 BADGE STANDARD VERT : Reprend le format de sécurité de 7DTD */
        .type-badge { display: inline-block; font-size: 11px; padding: 4px 12px; border-radius: 6px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; margin-right: 15px; border: 1px solid #1a3a24 !important; color: #2ecc71 !important; background: rgba(46,204,113,0.06) !important; font-family: monospace; }
        
        .live-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin: 25px 0; }
        
        .info-panel { background: rgba(4, 10, 22, 0.5); border: 1px dashed rgba(0, 162, 255, 0.3); padding: 15px; border-radius: 8px; text-align: center; backdrop-filter: blur(4px); }
        .info-panel h5 { margin: 0 0 6px 0; color: #00a2ff; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 0 5px rgba(0,162,255,0.3); }
        .info-panel .val { font-size: 13px; font-weight: bold; color: #fff; font-family: monospace; }
        
        .map-preview-container { margin: 25px 0; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
        .map-interactive-image { width: 100%; max-width: 500px; height: auto; border: 1px solid rgba(0, 162, 255, 0.4); border-radius: 8px; transition: 0.3s ease; cursor: pointer; }
        .map-interactive-image:hover { border-color: #00a2ff; box-shadow: 0 0 20px rgba(0, 162, 255, 0.4); transform: scale(1.01); }
        
        .dashboard-container { display: flex; gap: 20px; margin-top: 30px; text-align: left; height: 280px; }
        .sidebar-tabs { width: 220px; display: flex; flex-direction: column; gap: 8px; background: rgba(4, 10, 22, 0.5); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        
        .tab-btn { background: rgba(255,255,255,0.01); border: 1px solid rgba(0, 162, 255, 0.3); color: #8ab4f8; padding: 11px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; text-align: left; transition: 0.2s; text-transform: uppercase; }
        .tab-btn:hover, .tab-btn.active { border-color: #00a2ff; color: #ffffff; background: rgba(0, 162, 255, 0.15); box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }
        
        .content-display-area { flex: 1; background: rgba(3, 8, 18, 0.6); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; overflow-y: auto; line-height: 1.6; font-size: 13px; color: #ffffff; backdrop-filter: blur(4px); }
        .content-display-area h4 { color: #00a2ff; margin-top: 0; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid rgba(0, 162, 255, 0.3); padding-bottom: 5px; text-shadow: 0 0 5px rgba(0,162,255,0.4); }
    </style>
</head>
<body>
<div class="game-layout">
    <div style="text-align: left; margin-bottom: 20px;">
        <a href="../index.html" class="btn-portal-back">🏡 Retour au Portail</a>
    </div>
    <div class="server-card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 15px; margin-bottom: 25px;">
            <span id="server-title" style="font-size: 22px; color: #00a2ff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 162, 255, 0.5);">Initialisation Cyber-Pont...</span>
            <div style="display: flex; align-items: center;">
                <!-- 💡 APPLIQUE LA STRUCTURE STANDARD DU BADGE ET DE LA MENSTION ONLINE -->
                <div id="server-game-mode-badge" class="type-badge">Scan System...</div>
                <span class="led-green"></span>
                <span style="color:#2ecc71; font-weight:bold; font-size: 13px; text-shadow: 0 0 5px #2ecc71;">ONLINE: </span>
                <span id="players-count" style="font-size:18px; font-weight:bold; margin-left: 5px; color:#fff; font-family:monospace;">0 / 20</span>
            </div>
        </div>
        <div class="live-info-grid">
            <div class="info-panel"><h5>🗺️ Secteur Actif</h5><div id="avorion-sector-name" class="val">-</div></div>
            <div class="info-panel"><h5>⚙️ Version Galaxie</h5><div id="avorion-version" class="val">-</div></div>
            <div class="info-panel"><h5>⏱️ Temps Quadrant</h5><div id="avorion-time" class="val">-</div></div>
            <div class="info-panel"><h5>🛡️ Bouclier Secteur</h5><div id="avorion-shield" class="val" style="color: #00ffcc; text-shadow: 0 0 5px #00ffcc;">100%</div></div>
            <div class="info-panel"><h5>💥 Vaisseaux Détruits</h5><div id="avorion-kills" class="val">-</div></div>
            <div class="info-panel" style="border-color: #00ffcc;"><h5 style="color: #00ffcc; text-shadow: 0 0 5px #00ffcc;">🔄 Prochain Reboot</h5><div id="avorion-reboot-countdown" class="val" style="color: #00ffcc;">Calcul...</div></div>
        </div>
        <div class="map-preview-container">
            <h5 style="color: #00a2ff; margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; text-shadow: 0 0 5px rgba(0, 162, 255, 0.3);">🗺️ Cartographie Quadrant / Galaxy Map (Cliquez pour zoomer) :</h5>
            <a id="avorion-map-link" href="#" target="_blank">
                <img id="avorion-map-img" src="" alt="Carte Sectorielle non chargée" class="map-interactive-image">
            </a>
        </div>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
            <button id="radar-refresh-btn" class="btn-7dtd" onclick="forceRadarRefresh()">📡 Scan Auto dans 60s</button>
        </div>
        <div class="dashboard-container">
            <div class="sidebar-tabs">
                <button id="tab-motd" class="tab-btn active" onclick="switchConsoleTab('motd')">📢 Directive (MOTD)</button>
                <button id="tab-rules" class="tab-btn" onclick="switchConsoleTab('rules')">📜 Lois Hyperspatiales</button>
            </div>
            <div id="consoleDisplayArea" class="content-display-area">-</div>
        </div>
    </div>
</div>
<script>
const INTERNAL_AVORION_CONFIG = {
    "avorion1": { "ip": "67.216.85.235", "port": 25598, "mapImg": "map_avorion1.jpg" },
    "avorion2": { "ip": "172.240.47.89", "port": 25605, "mapImg": "map_avorion2.jpg" }
};
<script src="../js/config.js"></script>
<script>
const SEPARATED_AVORION_DATA = {
    'avorion1': {
        name: "🛡️ QBC FLAGGARD AVORION — SECTEUR CORE 1",
        gameModeText: "🟢 CYBER ONLINE",
        gameModeColor: "#2ecc71", gameModeBg: "rgba(46,204,113,0.06)", gameModeBorder: "#1a3a24",
        mapFallback: "Galaxy_Sector_Alpha_01", timeFallback: "Quadrant 04 - Cycle 12", versionFallback: "v2.5 Stable", killsFallback: "2,410 Vaisseaux",
        morningReboot: 6, eveningReboot: 18,
        mapImg: "map_avorion1.jpg",
        motd: `<h4>📢 DIRECTIVE DE BORD — SECTEUR CORE 1</h4><p style="color: #00a2ff; font-weight: bold; text-transform: uppercase;">🚀 INITIALISATION DE LA FLOTTE EN COURS</p>
               <details open style="background: rgba(0, 162, 255, 0.02); border: 1px solid #00558f; border-radius: 4px; padding: 6px; margin-bottom: 6px;"><summary style="color: #00a2ff; font-weight: bold; font-size: 12px; cursor: pointer;">📋 Fiche Technique : QBC Flaggard Core 1</summary><div style="padding: 5px; font-size: 11px; font-family: monospace; color: #fff;"><strong>ServerDescription:</strong> Server-Side 2.6++ | 40+ MODS++ | Location: Canada - Montreal</div></details>`,
        rules: `<h4>📜 LOIS HYPERSPATIALES — CORE 1</h4><div style="font-family: monospace; font-size: 12px; color: #eee; line-height: 1.6;"><p><strong>1✗- SÉCURITÉ :</strong> Interdiction de piller les débris au sein des secteurs de guilde alliée.</p></div>`
    },
    'avorion2': {
        name: "🛡️ QBC FLAGGARD AVORION — SECTEUR CORE 2",
        gameModeText: "🟢 CYBER ONLINE",
        gameModeColor: "#2ecc71", gameModeBg: "rgba(46,204,113,0.06)", gameModeBorder: "#1a3a24",
        mapFallback: "Galaxy_Sector_Beta_02", timeFallback: "Quadrant 09 - Cycle 02", versionFallback: "v2.5 Modded+", killsFallback: "840 Vaisseaux",
        morningReboot: 5, eveningReboot: 17,
        mapImg: "map_avorion2.jpg",
        motd: `<h4>📢 DIRECTIVE DE BORD — SECTEUR CORE 2</h4><p style="color: #00a2ff; font-weight: bold; text-transform: uppercase;">🌱 EXTENSION DES SYSTÈMES ET COMPOSANTS MODDÉS</p>`,
        rules: `<h4>📜 LOIS HYPERSPATIALES — CORE 2</h4><div style="font-family: monospace; font-size: 12px; color: #eee; line-height: 1.6;"><p><strong>1✗- RESPECT :</strong> Veuillez respecter l'emplacement des stations de saut.</p></div>`
    }
};

let activeServerKey = "avorion1";
let radarTimeLeft = 60;
let radarTimerInterval = null;

function switchConsoleTab(tabName) {
    const displayArea = document.getElementById('consoleDisplayArea');
    if (displayArea && SEPARATED_AVORION_DATA[activeServerKey][tabName]) {
        displayArea.innerHTML = SEPARATED_AVORION_DATA[activeServerKey][tabName];
    }
    ['motd', 'rules'].forEach(t => { const btn = document.getElementById('tab-' + t); if (btn) { if (t === tabName) btn.classList.add('active'); else btn.classList.remove('active'); } });
}

function startRadarCountdown() {
    if (radarTimerInterval) clearInterval(radarTimerInterval);
    radarTimeLeft = 60;
    const radarBtn = document.getElementById('radar-refresh-btn');
    radarTimerInterval = setInterval(() => {
        radarTimeLeft--;
        if (radarBtn) radarBtn.innerText = `📡 Scan Auto dans ${radarTimeLeft}s`;
        if (radarTimeLeft <= 0) loadAvorionStats(true);
    }, 1000);
}

function forceRadarRefresh() {
    alert("📡 Resynchronisation immédiate des quadrants Avorion !");
    loadAvorionStats(false);
}

function updateRebootTimer() {
    const now = new Date(); const currentHour = now.getHours(); const currentData = SEPARATED_AVORION_DATA[activeServerKey];
    let targetHour = (currentHour >= currentData.morningReboot && currentHour < currentData.eveningReboot) ? currentData.eveningReboot : currentData.morningReboot;
    let targetDate = new Date(); targetDate.setHours(targetHour, 0, 0, 0);
    if (currentHour >= currentData.eveningReboot) { targetDate.setDate(targetDate.getDate() + 1); targetDate.setHours(currentData.morningReboot, 0, 0, 0); }
    const diffMs = targetDate - now;
    const countdownEl = document.getElementById('avorion-reboot-countdown');
    if (countdownEl) countdownEl.innerText = `Dans ${Math.floor(diffMs / 3600000)}h ${Math.floor((diffMs % 3600000) / 60000)}m (${targetHour}:00)`;
}

function loadAvorionStats(isAutoRefresh) {
    let searchKey = new URLSearchParams(window.location.search).get('server');
    if (!searchKey) {
        if (window.location.href.includes('avorion1')) searchKey = 'avorion1';
        else if (window.location.href.includes('avorion2')) searchKey = 'avorion2';
        else searchKey = 'avorion1';
    }
    activeServerKey = searchKey;
    const currentData = SEPARATED_AVORION_DATA[activeServerKey];
    
    const realNetConfig = (typeof QBC_GLOBAL_CONFIG !== 'undefined') ? QBC_GLOBAL_CONFIG[activeServerKey] : null;
    const activeMapImg = realNetConfig ? realNetConfig.mapImg : currentData.mapImg;
    const maxSlots = realNetConfig ? (realNetConfig.maxPlayers || 20) : 20;

    document.getElementById('server-title').innerText = currentData.name;
    
    const mapImgEl = document.getElementById('avorion-map-img');
    const mapLinkEl = document.getElementById('avorion-map-link');
    if (mapImgEl && mapLinkEl) {
        mapImgEl.src = activeMapImg;
        mapLinkEl.href = activeMapImg;
    }

    const mb = document.getElementById('server-game-mode-badge');
    if (mb) { 
        mb.innerText = currentData.gameModeText; 
        mb.style.color = currentData.gameModeColor; 
        mb.style.borderColor = currentData.gameModeBorder; 
        mb.style.background = currentData.gameModeBg; 
    }
    
    if (!isAutoRefresh) switchConsoleTab('motd');
    updateRebootTimer();
    startRadarCountdown();
    
    fetch('/.netlify/functions/get-players?game=' + activeServerKey)
        .then(res => res.json())
        .then(data => {
            if (data.online) {
                document.getElementById('players-count').innerText = `${data.count} / ${maxSlots}`;
                document.getElementById('avorion-sector-name').innerText = data.map || currentData.mapFallback;
                document.getElementById('avorion-version').innerText = data.version || currentData.versionFallback;
                document.getElementById('avorion-time').innerText = data.time || currentData.timeFallback;
                document.getElementById('avorion-kills').innerText = (data.kills || currentData.killsFallback);
            }
        })
        .catch(() => {
            document.getElementById('players-count').innerText = `0 / ${maxSlots}`;
            document.getElementById('avorion-sector-name').innerText = currentData.mapFallback; 
            document.getElementById('avorion-version').innerText = currentData.versionFallback; 
            document.getElementById('avorion-time').innerText = currentData.timeFallback;
            document.getElementById('avorion-kills').innerText = currentData.killsFallback;
        });
}

loadAvorionStats(false);
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'a' || e.key === 'A' || e.key === 'u' || e.key === 's' || e.key === 'S')) e.preventDefault(); });
</script>
</body>
</html>
