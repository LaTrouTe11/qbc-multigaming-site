<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CONSOLE QBC - 7DTD</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #ef4444; padding: 20px; border-radius: 8px; background: rgba(239,68,68,0.02); max-width: 600px; margin: 0 auto; }
        h1 { color: #ef4444; margin-top: 0; border-bottom: 1px solid #ef4444; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; color: #94a3b8; }
        input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #334155; color: #fff; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
        .btn-add { background: #ef4444; color: #fff; }
        .btn-save { background: #22c55e; color: #fff; }
        .status { margin-top: 15px; font-size: 13px; text-align: center; font-weight: bold; padding: 8px; border-radius: 4px; }
        .srv-item { background: #1e293b; padding: 15px; border-radius: 6px; margin-top: 15px; border-left: 4px solid #ef4444; }
    </style>
</head>
<body>

<div class="box">
    <h1>☣️ CONSOLE 7 DAYS TO DIE</h1>
    
    <label>🚨 Alerte Matrice Globale (Bandeau du haut) :</label>
    <input type="text" id="global-ticker-input" placeholder="Message réseau global...">

    <div id="servers-list-container"></div>

    <div class="btn-group">
        <button class="btn-add" onclick="addNewServerSlot()">➕ ADD SERVEUR</button>
        <button class="btn-save" onclick="saveDataToGitHub()">💾 ENREGISTRER / UPDATE</button>
    </div>

    <div id="sync-status-msg" class="status" style="background: #1e293b; color: #94a3b8;">Statut : Prêt</div>
</div>

<script>
    // COLLEZ SIMPLEMENT VOTRE TOKEN DU DÉBUT ENTRE LES GUILLEMETS ICI :
    const myToken = "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"; 
    
    const targetFile = 'fichierjs/7dtd.js';
    let localServersList = [];

    window.addEventListener("DOMContentLoaded", () => {
        fetch(targetFile)
            .then(res => res.json())
            .then(data => {
                if (data.globalTicker) document.getElementById('global-ticker-input').value = data.globalTicker;
                localServersList = data.servers || [];
                renderServersForm();
                showStatus("Données chargées avec succès !", "#22c55e", "rgba(34,197,94,0.1)");
            })
            .catch(() => {
                showStatus("Nouveau fichier prêt à être créé.", "#38bdf8", "rgba(56,189,248,0.1)");
                renderServersForm();
            });
    });

    function renderServersForm() {
        const container = document.getElementById("servers-list-container");
        container.innerHTML = "";
        localServersList.forEach((srv, index) => {
            container.innerHTML += `
                <div class="srv-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-weight:bold; color:#ef4444;">SERVEUR #${index + 1}</span>
                        <button onclick="removeServerSlot(${index})" style="background:#ef4444; color:#fff; padding:3px 8px; font-size:11px; flex:none; width:auto;">🗑️ DELETE</button>
                    </div>
                    <label>Nom du serveur :</label>
                    <input type="text" value="${srv.name}" onchange="updateSrvData(${index}, 'name', this.value)">
                    <label>Adresse IP :</label>
                    <input type="text" value="${srv.ip}" onchange="updateSrvData(${index}, 'ip', this.value)">
                    <label>Port :</label>
                    <input type="text" value="${srv.port}" onchange="updateSrvData(${index}, 'port', this.value)">
                    <label>Message de Maintenance :</label>
                    <input type="text" value="${srv.rebootAlert || ''}" placeholder="Ex: En maintenance" onchange="updateSrvData(${index}, 'rebootAlert', this.value)">
                </div>
            `;
        });
    }

    function addNewServerSlot() {
        localServersList.push({ name: "Nouveau Serveur 7DTD", ip: "67.216.85.235", port: "26900", rebootAlert: "" });
        renderServersForm();
    }

    function removeServerSlot(index) {
        localServersList.splice(index, 1);
        renderServersForm();
    }

    function updateSrvData(index, key, value) {
        localServersList[index][key] = value;
    }

    function showStatus(text, color, bg) {
        const el = document.getElementById('sync-status-msg');
        el.innerText = text;
        el.style.color = color;
        el.style.background = bg;
    }

    function saveDataToGitHub() {
        showStatus("Envoi en cours vers GitHub...", "#eab308", "rgba(234,179,8,0.1)");
        
        const payload = {
            globalTicker: document.getElementById('global-ticker-input').value,
            servers: localServersList,
            lastUpdate: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})
        };

        const url = "https://github.com" + targetFile;
        const headers = {
            "Authorization": "token " + myToken,
            "Accept": "application/vnd.github.v3+json"
        };

        fetch(url, { headers: headers })
            .then(res => res.status === 404 ? null : res.json())
            .then(fileData => {
                const sha = fileData ? fileData.sha : null;
                const contentString = JSON.stringify(payload, null, 2);
                const contentBase64 = btoa(unescape(encodeURIComponent(contentString)));

                const bodyPayload = {
                    message: "🤖 Update 7DTD",
                    content: contentBase64
                };
                if (sha) bodyPayload.sha = sha;

                return fetch(url, {
                    method: "PUT",
                    headers: headers,
                    body: JSON.stringify(bodyPayload)
                });
            })
            .then(response => {
                if (response.ok) {
                    showStatus("✅ MISE À JOUR OK À " + payload.lastUpdate, "#22c55e", "rgba(34,197,94,0.1)");
                } else {
                    showStatus("❌ Erreur GitHub (Vérifiez votre clé Token)", "#ef4444", "rgba(239,68,68,0.1)");
                }
            })
            .catch(() => {
                showStatus("❌ Échec de la connexion réseau.", "#ef4444", "rgba(239,68,68,0.1)");
            });
    }
</script>
</body>
</html>
